<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de ONG - Doa+</title>
    
  <link rel="stylesheet" href="cadstro_ong.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">
                <a href="/">
                    <span class="logo-text">❤️ Doa+</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">Início</a></li>
                <li><a href="/login" class="nav-link">Entrar</a></li>
            </ul>
        </nav>
    </header>
    
    <main style="min-height: calc(100vh - 200px); padding: 2rem;">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 2rem;">Cadastro de ONG</h2>
            
            <form id="cadastro-ong-form">
                <div class="form-group">
                    <label for="nome">Nome da ONG *</label>
                    <input type="text" id="nome" name="nome" required placeholder="Ex: Associação Solidária">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="cnpj">CNPJ *</label>
                        <input type="text" id="cnpj" name="cnpj" required placeholder="00.000.000/0001-00">
                    </div>
                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">E-mail *</label>
                    <input type="email" id="email" name="email" required placeholder="contato@ong.org">
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha *</label>
                    <input type="password" id="senha" name="senha" required placeholder="Mínimo 12 caracteres">
                    <small style="color: #7f8c8d;">Mínimo 12 caracteres, com letras maiúsculas, minúsculas, números e caracteres especiais</small>
                </div>
                
                <div class="form-group">
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco" name="endereco" placeholder="Rua, número, bairro">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" name="cidade" placeholder="São Paulo">
                    </div>
                    <div class="form-group">
                        <label for="uf">UF</label>
                        <select id="uf" name="uf">
                            <option value="">Selecione</option>
                            <option value="SP">SP</option>
                            <option value="RJ">RJ</option>
                            <option value="MG">MG</option>
                            <option value="RS">RS</option>
                            <option value="BA">BA</option>
                            <option value="PR">PR</option>
                            <option value="PE">PE</option>
                            <option value="CE">CE</option>
                            <option value="DF">DF</option>
                            <option value="GO">GO</option>
                            <option value="AM">AM</option>
                            <option value="PA">PA</option>
                            <option value="SC">SC</option>
                            <option value="ES">ES</option>
                            <option value="MT">MT</option>
                            <option value="MS">MS</option>
                            <option value="AL">AL</option>
                            <option value="AP">AP</option>
                            <option value="MA">MA</option>
                            <option value="PB">PB</option>
                            <option value="PI">PI</option>
                            <option value="RN">RN</option>
                            <option value="RO">RO</option>
                            <option value="RR">RR</option>
                            <option value="SE">SE</option>
                            <option value="TO">TO</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="descricao">Descrição da ONG</label>
                    <textarea id="descricao" name="descricao" rows="4" placeholder="Conte um pouco sobre o trabalho da sua organização..."></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Cadastrar ONG</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem;">
                Já tem cadastro? <a href="/login">Faça login</a>
            </p>
        </div>
    </main>
    
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2024 Doa+ - Todos os direitos reservados</p>
        </div>
    </footer>
    
    <div id="toast" class="toast" style="display: none;">
        <span class="toast-message"></span>
    </div>
    
    <script>
        // UTILS
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = toast.querySelector('.toast-message');
            
            toastMessage.textContent = message;
            toast.className = `toast toast-${type}`;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // API
        const API_BASE_URL = window.location.origin + '/api';

        class API {
            constructor() {
                this.token = localStorage.getItem('token');
            }

            getHeaders(includeAuth = true) {
                const headers = {
                    'Content-Type': 'application/json',
                };
                
                if (includeAuth && this.token) {
                    headers['Authorization'] = `Bearer ${this.token}`;
                }
                
                return headers;
            }

            async handleResponse(response) {
                const data = await response.json();
                
                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        window.location.href = '/login';
                        throw new Error('Sessão expirada. Faça login novamente.');
                    }
                    throw new Error(data.error || 'Erro na requisição');
                }
                
                return data;
            }

            async get(endpoint, params = null) {
                let url = `${API_BASE_URL}${endpoint}`;
                
                if (params) {
                    const queryParams = new URLSearchParams(params).toString();
                    url += `?${queryParams}`;
                }
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: this.getHeaders()
                });
                
                return this.handleResponse(response);
            }

            async post(endpoint, data) {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    method: 'POST',
                    headers: this.getHeaders(),
                    body: JSON.stringify(data)
                });
                
                return this.handleResponse(response);
            }

            async put(endpoint, data) {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    method: 'PUT',
                    headers: this.getHeaders(),
                    body: JSON.stringify(data)
                });
                
                return this.handleResponse(response);
            }

            async delete(endpoint) {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    method: 'DELETE',
                    headers: this.getHeaders()
                });
                
                return this.handleResponse(response);
            }

            async login(email, senha, tipo) {
                const data = await this.post('/auth/login', { email, senha, tipo });
                if (data.token) {
                    this.token = data.token;
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.usuario));
                    localStorage.setItem('userType', data.tipo);
                }
                return data;
            }

            async cadastrarOng(dados) {
                return this.post('/auth/cadastro/ong', dados);
            }

            async cadastrarDoador(dados) {
                return this.post('/auth/cadastro/doador', dados);
            }

            logout() {
                this.token = null;
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                localStorage.removeItem('userType');
            }

            async listarNecessidades(filtros = {}) {
                return this.get('/necessidades', filtros);
            }

            async buscarNecessidadePorId(id) {
                return this.get(`/necessidades/${id}`);
            }

            async registrarDoacao(dados) {
                return this.post('/doacoes', dados);
            }

            async listarMinhasDoacoes(status = null, limite = 10, offset = 0) {
                const params = { limite, offset };
                if (status) params.status = status;
                return this.get('/doacoes/minhas', params);
            }

            async confirmarDoacao(doacaoId) {
                return this.put(`/doacoes/${doacaoId}/confirmar`);
            }

            async listarOngs(filtros = {}) {
                return this.get('/ongs', filtros);
            }

            async buscarOngPorId(id) {
                return this.get(`/ongs/${id}`);
            }

            async obterEstatisticas() {
                return this.get('/dashboard/stats');
            }

            async obterLogsSeguranca(limite = 50) {
                return this.get('/security/logs', { limite });
            }
        }

        const api = new API();

        // AUTH MANAGER SIMPLIFICADO
        class AuthManager {
            constructor() {
                this.isAuthenticated = !!localStorage.getItem('token');
                this.user = JSON.parse(localStorage.getItem('user') || 'null');
                this.userType = localStorage.getItem('userType');
                
                this.init();
            }
            
            init() {
                this.setupEventListeners();
            }
            
            setupEventListeners() {
                const cadastroOngForm = document.getElementById('cadastro-ong-form');
                if (cadastroOngForm) {
                    cadastroOngForm.addEventListener('submit', this.handleCadastroOng.bind(this));
                }
                
                const cadastroDoadorForm = document.getElementById('cadastro-doador-form');
                if (cadastroDoadorForm) {
                    cadastroDoadorForm.addEventListener('submit', this.handleCadastroDoador.bind(this));
                }
            }
            
            async handleCadastroOng(e) {
                e.preventDefault();
                
                const dados = {
                    nome: document.getElementById('nome').value,
                    cnpj: document.getElementById('cnpj').value,
                    email: document.getElementById('email').value,
                    senha: document.getElementById('senha').value,
                    telefone: document.getElementById('telefone').value,
                    endereco: document.getElementById('endereco').value,
                    cidade: document.getElementById('cidade').value,
                    uf: document.getElementById('uf').value,
                    descricao: document.getElementById('descricao').value
                };
                
                const submitBtn = e.target.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                submitBtn.textContent = 'Cadastrando...';
                submitBtn.disabled = true;
                
                try {
                    await api.cadastrarOng(dados);
                    showToast('ONG cadastrada com sucesso! Faça login para continuar.', 'success');
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                    
                } catch (error) {
                    showToast(error.message, 'error');
                } finally {
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                }
            }
            
            async handleCadastroDoador(e) {
                e.preventDefault();
                
                const dados = {
                    nome: document.getElementById('nome').value,
                    email: document.getElementById('email').value,
                    senha: document.getElementById('senha').value,
                    telefone: document.getElementById('telefone').value
                };
                
                const submitBtn = e.target.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                submitBtn.textContent = 'Cadastrando...';
                submitBtn.disabled = true;
                
                try {
                    await api.cadastrarDoador(dados);
                    showToast('Cadastro realizado com sucesso! Faça login para continuar.', 'success');
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                    
                } catch (error) {
                    showToast(error.message, 'error');
                } finally {
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                }
            }
        }

        const auth = new AuthManager();
    </script>
</body>
</html>
