<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Doa+</title>

    <link rel="stylesheet" href="login.css">

</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">
                <a href="/">
                    <span class="logo-text">❤️ Doa+</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">Início</a></li>
                <li><a href="/cadastro.html" class="nav-link">Cadastrar</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 2rem;">Acesse sua conta</h2>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="Digite seu e-mail">
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required placeholder="Digite sua senha">
                </div>
                
                <div class="form-group">
                    <label for="tipo">Tipo de conta</label>
                    <select id="tipo">
                        <option value="doador">Doador</option>
                        <option value="ong">ONG</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Entrar</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem;">
                Ainda não tem cadastro? <a href="/cadastro.html">Cadastre-se aqui</a>
            </p>
        </div>
    </main>
    
    <footer class="footer">
        <p>&copy; 2024 Doa+ - Todos os direitos reservados</p>
    </footer>
    
    <div id="toast" class="toast" style="display: none;">
        <span class="toast-message"></span>
    </div>
    
    <script>
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = toast.querySelector('.toast-message');
            
            toastMessage.textContent = message;
            toast.className = `toast toast-${type}`;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        const API_BASE_URL = window.location.origin + '/api';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const tipo = document.getElementById('tipo').value;
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const textoOriginal = submitBtn.textContent;
            submitBtn.textContent = 'Entrando...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha, tipo })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Erro no login');
                }
                
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.usuario));
                    localStorage.setItem('userType', data.tipo);
                    
                    showToast('Login realizado com sucesso!', 'success');
                    
                    setTimeout(() => {
                        if (data.tipo === 'ong') {
                            window.location.href = '/dashboard_ong.html';
                        } else if (data.tipo === 'admin') {
                            window.location.href = '/admin.html';
                        } else {
                            window.location.href = '/';
                        }
                    }, 1000);
                }
                
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                submitBtn.textContent = textoOriginal;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
