<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Doador - Doa+</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f6fa;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 1rem;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo a {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .nav-link:hover {
            background: #34495e;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-size: 1rem;
        }

        .btn-primary {
            background: #27ae60;
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: #229954;
        }

        .btn-block {
            width: 100%;
        }

        .form-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .form-group textarea {
            resize: vertical;
            font-family: inherit;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .footer {
            text-align: center;
            padding: 1.5rem;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #333;
            color: white;
            padding: 1rem 2rem;
            border-radius: 5px;
            z-index: 1000;
            max-width: 400px;
        }

        .toast-success { background: #27ae60; }
        .toast-error { background: #e74c3c; }
        .toast-warning { background: #f39c12; }
        .toast-info { background: #2980b9; }

        a {
            color: #27ae60;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        main {
            min-height: calc(100vh - 200px);
            padding: 2rem;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav-menu {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">
                <a href="/">
                    <span class="logo-text">❤️ Doa+</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">Início</a></li>
                <li><a href="/login.html" class="nav-link">Entrar</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 2rem;">Cadastro de Doador</h2>
            
            <form id="cadastro-doador-form">
                <div class="form-group">
                    <label for="nome">Nome Completo *</label>
                    <input type="text" id="nome" name="nome" required placeholder="Digite seu nome completo">
                </div>
                
                <div class="form-group">
                    <label for="email">E-mail *</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com">
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha *</label>
                    <input type="password" id="senha" name="senha" required placeholder="Mínimo 6 caracteres">
                    <small style="color: #7f8c8d;">Mínimo 6 caracteres</small>
                </div>
                
                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Cadastrar Doador</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem;">
                Já tem cadastro? <a href="/login.html">Faça login aqui</a>
            </p>
        </div>
    </main>
    
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2024 Doa+ - Todos os direitos reservados</p>
        </div>
    </footer>
    
    <div id="toast" class="toast" style="display: none;">
        <span class="toast-message"></span>
    </div>
    
    <script>
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = toast.querySelector('.toast-message');
            
            toastMessage.textContent = message;
            toast.className = `toast toast-${type}`;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        const API_BASE_URL = window.location.origin + '/api';

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('cadastro-doador-form');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const dados = {
                        nome: document.getElementById('nome').value,
                        email: document.getElementById('email').value,
                        senha: document.getElementById('senha').value,
                        telefone: document.getElementById('telefone').value
                    };
                    
                    const submitBtn = e.target.querySelector('button[type="submit"]');
                    const textoOriginal = submitBtn.textContent;
                    submitBtn.textContent = 'Cadastrando...';
                    submitBtn.disabled = true;
                    
                    try {
                        const response = await fetch(`${API_BASE_URL}/auth/cadastro/doador`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(dados)
                        });
                        
                        const data = await response.json();
                        
                        if (!response.ok) {
                            throw new Error(data.error || 'Erro no cadastro');
                        }
                        
                        showToast('Cadastro realizado com sucesso! Faça login para continuar.', 'success');
                        
                        setTimeout(() => {
                            window.location.href = '/login.html';
                        }, 2000);
                        
                    } catch (error) {
                        showToast(error.message, 'error');
                    } finally {
                        submitBtn.textContent = textoOriginal;
                        submitBtn.disabled = false;
                    }
                });
            }
        });
    </script>
</body>
</html>
