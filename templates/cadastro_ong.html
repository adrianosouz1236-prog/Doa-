<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de ONG - Doa+</title>
    
    <link rel="stylesheet" href="estilos.css/cadastro_ong.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">
                <a href="/">
                    <span class="logo-text">❤️ Doa+</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">Início</a></li>
                <li><a href="/login.html" class="nav-link">Entrar</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 2rem;">Cadastro de ONG</h2>
            
            <form id="cadastro-ong-form">
                <div class="form-group">
                    <label for="nome">Nome da ONG *</label>
                    <input type="text" id="nome" name="nome" required placeholder="Ex: Associação Solidária">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="cnpj">CNPJ *</label>
                        <input type="text" id="cnpj" name="cnpj" required placeholder="00.000.000/0001-00">
                    </div>
                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">E-mail *</label>
                    <input type="email" id="email" name="email" required placeholder="contato@ong.org">
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha *</label>
                    <input type="password" id="senha" name="senha" required placeholder="Mínimo 12 caracteres">
                    <small style="color: #7f8c8d;">Mínimo 12 caracteres, com letras maiúsculas, minúsculas, números e caracteres especiais</small>
                </div>
                
                <div class="form-group">
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco" name="endereco" placeholder="Rua, número, bairro">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" name="cidade" placeholder="São Paulo">
                    </div>
                    <div class="form-group">
                        <label for="uf">UF</label>
                        <select id="uf" name="uf">
                            <option value="">Selecione</option>
                            <option value="SP">SP</option>
                            <option value="RJ">RJ</option>
                            <option value="MG">MG</option>
                            <option value="RS">RS</option>
                            <option value="BA">BA</option>
                            <option value="PR">PR</option>
                            <option value="PE">PE</option>
                            <option value="CE">CE</option>
                            <option value="DF">DF</option>
                            <option value="GO">GO</option>
                            <option value="AM">AM</option>
                            <option value="PA">PA</option>
                            <option value="SC">SC</option>
                            <option value="ES">ES</option>
                            <option value="MT">MT</option>
                            <option value="MS">MS</option>
                            <option value="AL">AL</option>
                            <option value="AP">AP</option>
                            <option value="MA">MA</option>
                            <option value="PB">PB</option>
                            <option value="PI">PI</option>
                            <option value="RN">RN</option>
                            <option value="RO">RO</option>
                            <option value="RR">RR</option>
                            <option value="SE">SE</option>
                            <option value="TO">TO</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="descricao">Descrição da ONG</label>
                    <textarea id="descricao" name="descricao" rows="4" placeholder="Conte um pouco sobre o trabalho da sua organização..."></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Cadastrar ONG</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem;">
                Já tem cadastro? <a href="/login.html">Faça login aqui</a>
            </p>
        </div>
    </main>
    
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2024 Doa+ - Todos os direitos reservados</p>
        </div>
    </footer>
    
    <div id="toast" class="toast" style="display: none;">
        <span class="toast-message"></span>
    </div>
    
<script src="javascript.js/cadastro_ong.js"></script>

    </body>
</html>
